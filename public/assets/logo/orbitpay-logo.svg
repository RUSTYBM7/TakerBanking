<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="disc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>

  <!-- Mark on left -->
  <g transform="translate(20, 10)">
    <rect width="200" height="200" rx="44" fill="url(#bg)"/>
    <ellipse cx="100" cy="100" rx="86" ry="28" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.85" transform="rotate(-22 100 100)"/>
    <ellipse cx="100" cy="100" rx="74" ry="22" fill="none" stroke="#0EA5E9" stroke-width="1.6" opacity="0.55" transform="rotate(32 100 100)"/>
    <circle cx="100" cy="100" r="46" fill="url(#disc)"/>
    <circle cx="100" cy="100" r="30" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <circle cx="100" cy="100" r="8" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark on right -->
  <g transform="translate(250, 0)">
    <text x="0" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="url(#wordmark)" letter-spacing="-3">OrbitPay</text>
    <text x="3" y="156" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#10B981" letter-spacing="8">CREDIT UNION</text>
    <line x1="0" y1="170" x2="280" y2="170" stroke="url(#disc)" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
